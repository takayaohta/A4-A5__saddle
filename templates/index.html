<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中綴じ面付け</title>
  <style>
    :root {
      --color-canvas-default: #ffffff;
      --color-canvas-subtle: #f6f8fa;
      --color-canvas-inset: #eff2f5;
      --color-border-default: #d0d7de;
      --color-border-muted: #d8dee4;
      --color-fg-default: #1f2328;
      --color-fg-muted: #656d76;
      --color-fg-subtle: #6e7781;
      --color-accent-fg: #0969da;
      --color-accent-emphasis: #0969da;
      --color-success-fg: #1a7f37;
      --color-success-emphasis: #1f883d;
      --color-danger-fg: #cf222e;
      --color-danger-emphasis: #cf222e;
      --color-attention-fg: #9a6700;
      --color-attention-subtle: #fff8c5;
      --color-btn-primary-bg: #1f883d;
      --color-btn-primary-hover: #1a7f37;
      --color-neutral-muted: rgba(175, 184, 193, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-fg-default);
      background: var(--color-canvas-subtle);
    }

    .AppHeader {
      background: #25292e;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .AppHeader-inner {
      max-width: 768px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .AppHeader-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      font-weight: 600;
      font-size: 16px;
    }

    .AppHeader-logo svg { fill: #ffffff; }

    .AppHeader-context {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }

    .container {
      max-width: 768px;
      margin: 0 auto;
      padding: 24px;
    }

    /* File Select Zone */
    .SelectZone {
      border: 2px dashed var(--color-border-default);
      border-radius: 6px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      background: var(--color-canvas-default);
      transition: border-color 0.15s, background 0.15s;
    }

    .SelectZone:hover {
      border-color: var(--color-accent-fg);
      background: #f0f7ff;
    }

    .SelectZone-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-canvas-subtle);
      border-radius: 6px;
      border: 1px solid var(--color-border-default);
    }

    .SelectZone-text {
      font-size: 14px;
      color: var(--color-fg-muted);
    }

    .SelectZone-text strong {
      color: var(--color-accent-fg);
    }

    /* Box (GitHub-style bordered section) */
    .Box {
      border: 1px solid var(--color-border-default);
      border-radius: 6px;
      background: var(--color-canvas-default);
      margin-top: 16px;
    }

    .Box.d-none { display: none; }

    .Box-header {
      padding: 12px 16px;
      background: var(--color-canvas-subtle);
      border-bottom: 1px solid var(--color-border-default);
      border-radius: 6px 6px 0 0;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .Box-body { padding: 16px; }

    .Box-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid var(--color-border-muted);
      font-size: 13px;
    }

    .Box-row:last-child { border-bottom: none; }

    .Box-row-label { color: var(--color-fg-muted); }

    .Box-row-value {
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .Box-row-value.path {
      font-size: 12px;
      color: var(--color-fg-subtle);
      word-break: break-all;
      text-align: right;
      max-width: 400px;
    }

    /* Labels / Badges */
    .Label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 2em;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .Label--success {
      color: var(--color-success-fg);
      background: #dafbe1;
      border-color: rgba(74, 194, 107, 0.4);
    }

    .Label--danger {
      color: var(--color-danger-fg);
      background: #ffebe9;
      border-color: rgba(255, 129, 130, 0.4);
    }

    .Label--attention {
      color: var(--color-attention-fg);
      background: var(--color-attention-subtle);
      border-color: rgba(212, 167, 44, 0.4);
    }

    /* Flash (notice / error) */
    .flash {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .flash.show { display: flex; }

    .flash-error {
      background: #ffebe9;
      border: 1px solid rgba(255, 129, 130, 0.4);
      color: var(--color-danger-fg);
    }

    /* Sheet Preview */
    .preview-section {
      display: none;
      margin-top: 16px;
    }

    .preview-section.show { display: block; }

    .SheetGroup { margin-bottom: 12px; }

    .SheetGroup-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 8px 16px;
      background: var(--color-canvas-subtle);
      border-bottom: 1px solid var(--color-border-muted);
    }

    .SheetCard {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border-muted);
      gap: 12px;
      font-size: 13px;
    }

    .SheetCard:last-child { border-bottom: none; }

    .SheetCard-side {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 2em;
      min-width: 44px;
      text-align: center;
    }

    .SheetCard-side.front {
      color: var(--color-accent-fg);
      background: #ddf4ff;
      border: 1px solid rgba(84, 174, 255, 0.4);
    }

    .SheetCard-side.back {
      color: #8250df;
      background: #fbefff;
      border: 1px solid rgba(194, 151, 255, 0.4);
    }

    .PageSpread {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .PageBox {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 36px;
      background: var(--color-canvas-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      position: relative;
    }

    .PageBox::after {
      content: attr(data-label);
      position: absolute;
      bottom: 1px;
      right: 3px;
      font-size: 9px;
      font-weight: 400;
      color: var(--color-fg-subtle);
    }

    .PageSpread-divider {
      width: 1px;
      height: 24px;
      background: var(--color-border-default);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 5px 16px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      line-height: 20px;
      border-radius: 6px;
      border: 1px solid;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .btn-primary {
      color: #ffffff;
      background: var(--color-btn-primary-bg);
      border-color: rgba(31, 35, 40, 0.15);
      box-shadow: 0 1px 0 rgba(31, 35, 40, 0.04);
    }

    .btn-primary:hover {
      background: var(--color-btn-primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-default {
      color: var(--color-fg-default);
      background: var(--color-canvas-subtle);
      border-color: var(--color-border-default);
      box-shadow: 0 1px 0 rgba(31, 35, 40, 0.04);
    }

    .btn-default:hover {
      background: var(--color-canvas-inset);
    }

    .btn-block {
      width: 100%;
      padding: 10px 16px;
    }

    .actions-area {
      display: none;
      margin-top: 16px;
    }

    .actions-area.show { display: block; }

    /* Result */
    .result-section {
      display: none;
      margin-top: 16px;
    }

    .result-section.show { display: block; }

    .result-path {
      font-size: 12px;
      color: var(--color-fg-subtle);
      word-break: break-all;
      padding: 8px 12px;
      background: var(--color-canvas-subtle);
      border-radius: 4px;
      border: 1px solid var(--color-border-default);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      margin: 12px 0 16px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    /* Reset link */
    .reset-area {
      display: none;
      margin-top: 16px;
      text-align: center;
    }

    .reset-area.show { display: block; }

    .reset-link {
      font-size: 13px;
      color: var(--color-accent-fg);
      text-decoration: none;
      cursor: pointer;
    }

    .reset-link:hover { text-decoration: underline; }

    /* Progress */
    .Overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(31, 35, 40, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .Overlay.show { display: flex; }

    .Overlay-content {
      background: var(--color-canvas-default);
      border: 1px solid var(--color-border-default);
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
    }

    .Spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-border-default);
      border-top-color: var(--color-accent-fg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .Overlay-text {
      font-size: 14px;
      color: var(--color-fg-muted);
    }

    /* Fade in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .anim-fade-in { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="AppHeader">
    <div class="AppHeader-inner">
      <div class="AppHeader-logo">
        <svg height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 2H3a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zm0 14H3a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1zm14-14h-4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zm0 14h-4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1zM14 9H10a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1z"/>
        </svg>
        中綴じ面付け
      </div>
      <span class="AppHeader-context">A5 → A4 横 面付け</span>
    </div>
  </div>

  <div class="container">
    <!-- File Select -->
    <div class="SelectZone" id="dropZone">
      <div class="SelectZone-icon">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="var(--color-fg-muted)">
          <path d="M3.75 1.5a.25.25 0 0 0-.25.25v11.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V6H9.75A1.75 1.75 0 0 1 8 4.25V1.5H3.75zm5.75.56v2.19c0 .138.112.25.25.25h2.19L9.5 2.06zM2 1.75C2 .784 2.784 0 3.75 0h5.086c.464 0 .909.184 1.237.513l3.414 3.414c.329.328.513.773.513 1.237v8.086A1.75 1.75 0 0 1 12.25 15h-8.5A1.75 1.75 0 0 1 2 13.25V1.75z"/>
        </svg>
      </div>
      <div class="SelectZone-text">
        クリックして<strong>PDFファイルを選択</strong>
      </div>
    </div>

    <!-- Error -->
    <div class="flash flash-error" id="errorMessage">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575ZM8 5a.75.75 0 0 0-.75.75v2.5a.75.75 0 0 0 1.5 0v-2.5A.75.75 0 0 0 8 5Zm0 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/>
      </svg>
      <span id="errorText"></span>
    </div>

    <!-- File Info -->
    <div class="Box d-none anim-fade-in" id="fileInfo">
      <div class="Box-header">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="var(--color-fg-muted)">
          <path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c.09 0 .167.032.232.09l.848.777A.25.25 0 0 0 6.252 2H13.5a.5.5 0 0 1 .5.5v.55a.75.75 0 0 1 0 .348V13.5a1.5 1.5 0 0 1-1.5 1.5H3a1.5 1.5 0 0 1-1.5-1.5V7.53a.75.75 0 0 1 0-.348V1.75z"/>
        </svg>
        ファイル情報
      </div>
      <div class="Box-row">
        <span class="Box-row-label">ファイル名</span>
        <span class="Box-row-value" id="fileName">-</span>
      </div>
      <div class="Box-row">
        <span class="Box-row-label">場所</span>
        <span class="Box-row-value path" id="filePath">-</span>
      </div>
      <div class="Box-row">
        <span class="Box-row-label">ページ数</span>
        <span class="Box-row-value" id="pageCount">-</span>
      </div>
      <div class="Box-row">
        <span class="Box-row-label">ページサイズ</span>
        <span class="Box-row-value" id="pageSize">-</span>
      </div>
      <div class="Box-row">
        <span class="Box-row-label">ステータス</span>
        <span class="Box-row-value" id="validationStatus">-</span>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-section" id="previewSection">
      <div class="Box">
        <div class="Box-header">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="var(--color-fg-muted)">
            <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25H6.5V1.5Zm6.25 0v6.75H14.5V1.75a.25.25 0 0 0-.25-.25ZM14.5 9.5H8v5H14.25a.25.25 0 0 0 .25-.25Z"/>
          </svg>
          面付け順プレビュー
        </div>
        <div id="previewContent"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions-area" id="actions">
      <button class="btn btn-primary btn-block" id="imposeBtn" onclick="runImpose()">
        面付け実行
      </button>
    </div>

    <!-- Result -->
    <div class="result-section" id="resultSection">
      <div class="Box anim-fade-in">
        <div class="Box-header" style="color: var(--color-success-fg);">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 16A8 8 0 1 1 8 0a8 8 0 0 1 0 16Zm3.78-9.72a.751.751 0 0 0-1.042-.018l-.018.018L6.75 10.25 5.28 8.78a.751.751 0 0 0-1.042 1.042l2 2a.75.75 0 0 0 1.042 0l4.5-4.5a.751.751 0 0 0-.002-1.042Z"/>
          </svg>
          面付け完了
        </div>
        <div class="Box-body">
          <div class="result-path" id="outputPath"></div>
          <div class="result-actions">
            <button class="btn btn-default" onclick="revealInFinder()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c.09 0 .167.032.232.09l.848.777A.25.25 0 0 0 6.252 2H13.5a.5.5 0 0 1 .5.5v.55a.75.75 0 0 1 0 .348V13.5a1.5 1.5 0 0 1-1.5 1.5H3a1.5 1.5 0 0 1-1.5-1.5V7.53a.75.75 0 0 1 0-.348V1.75z"/>
              </svg>
              Finder で表示
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reset -->
    <div class="reset-area" id="resetBtn">
      <a class="reset-link" onclick="resetAll()">← 別のファイルを処理する</a>
    </div>
  </div>

  <!-- Progress Overlay -->
  <div class="Overlay" id="progressOverlay">
    <div class="Overlay-content">
      <div class="Spinner"></div>
      <div class="Overlay-text" id="progressText">面付け処理中…</div>
    </div>
  </div>

  <script>
    let currentOutputPath = '';

    const dropZone = document.getElementById('dropZone');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const fileInfo = document.getElementById('fileInfo');
    const previewSection = document.getElementById('previewSection');
    const previewContent = document.getElementById('previewContent');
    const actions = document.getElementById('actions');
    const imposeBtn = document.getElementById('imposeBtn');
    const resultSection = document.getElementById('resultSection');
    const outputPathEl = document.getElementById('outputPath');
    const progressOverlay = document.getElementById('progressOverlay');
    const progressText = document.getElementById('progressText');
    const resetBtn = document.getElementById('resetBtn');

    dropZone.addEventListener('click', () => selectFile());

    async function selectFile() {
      hideAll();
      progressText.textContent = 'ファイル選択ダイアログを開いています…';
      progressOverlay.classList.add('show');

      try {
        const res = await fetch('/api/select-file', { method: 'POST' });
        const data = await res.json();
        progressOverlay.classList.remove('show');

        if (!res.ok) {
          if (data.error !== 'ファイル選択がキャンセルされました') {
            showError(data.error || '不明なエラーが発生しました。');
          }
          return;
        }

        displayFileInfo(data);
      } catch (err) {
        progressOverlay.classList.remove('show');
        showError('サーバーとの通信に失敗しました。');
        console.error(err);
      }
    }

    function displayFileInfo(data) {
      document.getElementById('fileName').textContent = data.filename;
      const dirPath = data.filepath.substring(0, data.filepath.lastIndexOf('/'));
      document.getElementById('filePath').textContent = dirPath;
      document.getElementById('pageCount').textContent = `${data.total_pages} ページ`;

      let sizeText = `${data.page_width_mm} × ${data.page_height_mm} mm`;
      if (data.needs_scaling) {
        sizeText += ` → ${data.scale}% に縮小`;
      }
      document.getElementById('pageSize').textContent = sizeText;

      const statusEl = document.getElementById('validationStatus');
      if (data.is_valid) {
        let html = `<span class="Label Label--success">✓ 4の倍数（${data.sheets}枚）</span>`;
        if (data.needs_scaling) {
          html += ` <span class="Label Label--attention">⚡ A4自動縮小</span>`;
        }
        statusEl.innerHTML = html;
      } else {
        statusEl.innerHTML = `<span class="Label Label--danger">✗ 4の倍数ではありません</span>`;
      }

      fileInfo.classList.remove('d-none');

      if (data.is_valid) {
        renderPreview(data.imposition_order, data.sheets);
        previewSection.classList.add('show');
        actions.classList.add('show');
      } else {
        showError(`ページ数（${data.total_pages}）が4の倍数ではありません。中綴じには4の倍数のページ数が必要です。`);
      }
    }

    function renderPreview(order, sheets) {
      let html = '';
      for (let s = 0; s < sheets; s++) {
        html += `<div class="SheetGroup">`;
        html += `<div class="SheetGroup-label">${s + 1}枚目</div>`;
        for (let i = 0; i < 2; i++) {
          const pair = order[s * 2 + i];
          const isFront = pair.side === 'おもて';
          html += `
            <div class="SheetCard">
              <span class="SheetCard-side ${isFront ? 'front' : 'back'}">${pair.side}</span>
              <div class="PageSpread">
                <div class="PageBox" data-label="左">${pair.left}</div>
                <div class="PageSpread-divider"></div>
                <div class="PageBox" data-label="右">${pair.right}</div>
              </div>
            </div>`;
        }
        html += `</div>`;
      }
      previewContent.innerHTML = html;
    }

    async function runImpose() {
      imposeBtn.disabled = true;
      progressText.textContent = '面付け処理中…';
      progressOverlay.classList.add('show');

      try {
        const res = await fetch('/api/impose', { method: 'POST' });
        const data = await res.json();
        progressOverlay.classList.remove('show');

        if (!res.ok) {
          showError(data.error || '面付け処理に失敗しました。');
          imposeBtn.disabled = false;
          return;
        }

        currentOutputPath = data.output_path;
        outputPathEl.textContent = data.output_path;
        actions.classList.remove('show');
        resultSection.classList.add('show');
        resetBtn.classList.add('show');
      } catch (err) {
        progressOverlay.classList.remove('show');
        showError('サーバーとの通信に失敗しました。');
        imposeBtn.disabled = false;
        console.error(err);
      }
    }

    async function revealInFinder() {
      try {
        await fetch('/api/reveal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: currentOutputPath }),
        });
      } catch (err) {
        console.error('Finder表示に失敗:', err);
      }
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorMessage.classList.add('show');
    }

    function hideAll() {
      errorMessage.classList.remove('show');
      fileInfo.classList.add('d-none');
      previewSection.classList.remove('show');
      actions.classList.remove('show');
      resultSection.classList.remove('show');
      resetBtn.classList.remove('show');
      imposeBtn.disabled = false;
      currentOutputPath = '';
    }

    function resetAll() { hideAll(); }
  </script>
</body>
</html>
